body:
  text: 重刻大佛頂經玄文序性相二宗猶波之與水從來不可分隔而其流弊也甚至分河飲水此豈文殊彌勒之過亦豈馬鳴護法之旨哉謂真如受熏譬如劫火洞然虗空安得獨冷謂真如不受熏譬如劫火洞然時虗空何嘗爛壞故知得其語脈者合則雙美失其宗趣者離則兩傷觀大佛頂經第四卷云譬如虗空體非羣相而不拒彼諸相發揮只此一言兩疑氷釋善夫智者大師有言偏執法性生一切法何異自生偏執梨耶生一切法何異他生例而推之縱謂法性梨耶和合生一切法何異共生縱謂非法性非梨耶生一切法又何異無因緣生繇此觀之四句無非是謗倘能妙達無生不起性計則四句雖不可説有四悉檀因緣故亦可得説謂真如不思議熏生一切法謂梨耶是可熏性生一切法皆無不可吾乃知智者大師真悟權實祕要故能于大佛頂經未來之時懸合其旨趣若此之經來時智者不可復作習台宗者昧于唯識習法相者迷于圓理所以衆解紛紛咸失綱要究義理之攸歸大似蚊咬鐵橛判文字之下落亦如鑿孔栽鬚旭于未剃髮日即曾研究此典每翻舊注迷悶實多後因雙徑坐禪始解文字之縛復因數番講演深理葛藤之根並探二宗融以心鏡直至溫陵弘法方得取筆疾書脫稿未幾剞劂旋畢板留甘露戒壇不能携至江外茲者幻遊普德略露賊私諸友固追不已頓公發意重刊爰述片言以為弄引剖千古未破之籓籬犯從來嚴設之禁忌位卑言高安免于罪然在出世君子諒不以人廢言也甲申春日古吳藕益智旭書大佛頂如來密因修證了義諸菩薩萬行首楞嚴經玄義
